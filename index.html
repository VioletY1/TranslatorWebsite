<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaLink Translator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="translator" aria-label="Language translator">
        <div class="masthead">
          <p class="eyebrow">LinguaLink</p>
          <h1>Translate phrases across English, Spanish, French, and Chinese.</h1>
        </div>

        <div class="language-bar" aria-label="Language choices">
          <label>
            <span>From</span>
            <select id="sourceLanguage">
              <option value="english" selected>English</option>
              <option value="spanish">Spanish</option>
              <option value="french">French</option>
            </select>
          </label>

          <label>
            <span>To</span>
            <select id="targetLanguage">
              <option value="chinese" selected>Chinese</option>
              <option value="spanish">Spanish</option>
              <option value="french">French</option>
            </select>
          </label>
        </div>

        <div class="workspace">
          <label class="panel">
            <span class="panel-label">Original</span>
            <textarea id="sourceText" placeholder="Type a phrase, like "Good morning""></textarea>
          </label>

          <section class="panel output-panel" aria-live="polite">
            <div class="panel-label-row">
              <span class="panel-label">Translation</span>
            </div>
            <p id="translationOutput" class="translation-output empty">Your translation will appear here.</p>
          </section>
        </div>

        <div class="actions">
          <button id="translateButton" class="primary-button" type="button">Translate</button>
          <button id="clearButton" class="secondary-button" type="button">Clear</button>
        </div>

        <section class="phrase-bank" aria-label="Suggested phrases">
          <div>
            <h2>Try a phrase</h2>
            <p>Pick one, then change the languages above.</p>
          </div>
          <div id="phraseButtons" class="phrase-buttons"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
