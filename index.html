<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaLink Translator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="translator" aria-label="Language translator">
        <div class="masthead">
          <p class="eyebrow">LinguaLink</p>
          <h1>Translate phrases across English, Spanish, French, and Chinese.</h1>
        </div>

        <form method="post" action="/" class="translator-form">
        <div class="language-bar" aria-label="Language choices">
          <label>
            <span>From</span>
            <select id="sourceLanguage" name="source_language">
              {{ source_options }}
            </select>
          </label>

          <label>
            <span>To</span>
            <select id="targetLanguage" name="target_language">
              {{ target_options }}
            </select>
          </label>
        </div>

        <div class="workspace">
          <label class="panel">
            <span class="panel-label">Original</span>
            <textarea id="sourceText" name="text" placeholder="Type a phrase, like “Good morning”">{{ source_text }}</textarea>
          </label>

          <section class="panel output-panel" aria-live="polite">
            <div class="panel-label-row">
              <span class="panel-label">Translation</span>
            </div>
            <p id="translationOutput" class="translation-output{{ output_class }}">{{ translation }}</p>
          </section>
        </div>

        <div class="actions">
          <button id="translateButton" class="primary-button" type="submit">Translate</button>
          <a class="secondary-button" href="/">Clear</a>
        </div>

        <section class="phrase-bank" aria-label="Suggested phrases">
          <div>
            <h2>Try a phrase</h2>
            <p>Pick one, then change the languages above.</p>
          </div>
          <div id="phraseButtons" class="phrase-buttons">{{ phrase_buttons }}</div>
        </section>
        </form>
      </section>
    </main>
  </body>
</html>
